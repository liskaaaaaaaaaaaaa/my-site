<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tatts By Alisa</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Tatts By Alisa</h1>
  <nav>
    <a href="#portfolio">Portfolio</a>
    <a href="#booking">Booking</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Custom Tattoo Art</h2>
  <p>custom • graphic • high-contrast</p>
</section>

<section id="portfolio">
  <h2>Portfolio</h2>
  <div class="gallery">
    <img src="images/tattoo1.jpg" alt="">
    <img src="images/tattoo2.jpg" alt="">
    <img src="images/tattoo3.jpg" alt="">
  </div>
</section>

<section id="booking">
  <h2>Book a Session</h2>

  <form id="bookingForm">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Describe your tattoo idea"></textarea>
    <button type="submit">Send Request</button>
  </form>

</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Instagram: @tattsbyalisa</p>
  <p>Email: tattsbyal1sa@gmail.com</p>
</section>

<footer>
  <p>© 2026 Tatts By Alisa</p>
</footer>

<script src="script.js"></script>

</body>
</html>
